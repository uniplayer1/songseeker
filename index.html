<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SongSeeker</title>
    
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <!-- PWA / Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192x192.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icon-96x96.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <h2>SongSeeker</h2>

    <!-- Compact toolbar for quick actions -->
    <div id="toolbar" class="toolbar">
        <button id="settingsIcon" class="icon-button" title="Settings"><i class="fa fa-cog"></i></button>
        <button id="autoplayIcon" class="icon-button" title="Toggle Autoplay"><i class="fa fa-play"></i></button>
        <button id="normalizeIcon" class="icon-button" title="Volume Normalization"><i class="fa fa-volume-up"></i></button>
        <button id="reportsIcon" class="icon-button" title="View Reported Songs"><i class="fa fa-list"></i></button>
    </div>

    <!-- Hidden state inputs -->
    <input type="checkbox" id="autoplay" name="autoplay" style="display:none;" aria-hidden="true" />
    <input type="checkbox" id="normalize" name="normalize" style="display:none;" aria-hidden="true" checked />

    <!-- Settings Panel -->
    <div class="settings_div hidden" id="settings_div">
        <div class="text-block">
            <div class="heading">Random Playback</div>
            <div>
                <input type="checkbox" id="randomplayback" name="randomplayback" />
                <label for="randomplayback">Enable Random Start Time</label>
                <br />
                <input type="checkbox" id="normalize-setting" name="normalize-setting" />
                <label for="normalize-setting">Volume Normalization (Local)</label>
                <br />
                <label for="playback-duration">Duration (seconds):</label>
                <input type="number" id="playback-duration" value="30" min="5" max="300">
            </div>      
        </div>

        <div class="text-block">
            <div class="heading">Debug & Tools</div>
            <div>
                <input type="checkbox" id="songinfo" name="songinfo" />
                <label for="songinfo">Display Metadata</label>
                <br/>
                <input type="checkbox" id="cookies" name="cookies" />
                <label for="cookies">Inspect Cookies</label>
                <div id="cookielist" class="hidden" style="font-size: 10px; color: var(--text-muted); word-break: break-all; margin-top: 5px;"></div>
                <br/>
                <button id="debugButton" class="button" style="padding: 10px 20px; font-size: 12px; margin-top: 10px;">Simulation Test</button>
            </div>
        </div>
    </div>

    <!-- Scanner Interface -->
    <div id="qr-reader" style="display:none;">
        <video id="qr-video"></video>
    </div>

    <div class="actions">
        <button id="startScanButton" class="button_startscan">Scan QR Code</button>
        <button id="cancelScanButton" class="button" style="display:none; background-color: var(--accent-stop);">Stop Camera</button>
        <button id="reportButton" class="button_report" style="display:none;">Report Issue</button>
    </div>

    <hr />

    <!-- Player Interface -->
    <button id="startstop-video" class="button_startstop" disabled>Play</button>

    <div id="equalizer" class="equalizer-container">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div class="metadata-container">
        <div style="display:none;"><strong>ID:</strong> <span id="video-id"></span></div>
        <div style="display:none;"><strong>Title:</strong> <span id="video-title"></span></div>
        <div style="display:none;"><strong>Duration:</strong> <span id="video-duration"></span></div>
        <div style="display:none;"><strong>Year:</strong> <span id="video-year"></span></div>
    </div>

    <br/>
    <footer style="margin-top: 20px;">
        <a href="https://github.com/andygruber/songseeker/" target="_blank">
            <i class="fab fa-github"></i> View Original Project
        </a>
    </footer>

    <!-- Hidden Players -->
    <div id="player"></div> 
    <audio id="local-player" style="display:none;"></audio>

    <!-- Modals -->
    <div id="reportModal" class="modal hidden">
        <div class="modal-content text-block">
            <div class="heading">Report a Problem</div>
            
            <label for="reportReason" style="font-size: 14px; margin-top: 10px; display: block;">What is wrong?</label>
            <select id="reportReason" class="modern-select">
                <option value="broken_link">Broken Link / Doesn't Play</option>
                <option value="wrong_song">Wrong Song / Metadata</option>
                <option value="bad_quality">Poor Audio Quality</option>
                <option value="other">Other Issue</option>
            </select>
            
            <div class="modal-actions">
                <button id="submitReport" class="button_startscan">Send Report</button>
                <button id="cancelReport" class="button">Dismiss</button>
            </div>
        </div>
    </div>

    <div id="reportListModal" class="modal hidden">
        <div class="modal-content text-block">
            <div class="heading">Recent Reports</div>
            <div id="reportsList" class="reports-list">Fetching entries...</div>
            <div class="modal-actions">
                <button id="closeReports" class="button">Close</button>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script type="module" src="app.js?v=20260302"></script>
</body>
</html>
