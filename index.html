<!DOCTYPE html>
<html>

  <head>
    <title>SongSeeker</title>
    <script type="module">
      import QrScanner from "https://unpkg.com/qr-scanner/qr-scanner.min.js";
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <!-- Font Awesome for consistent scalable icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- iOS icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180x180.png">
    <!-- Android icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192x192.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icon-96x96.png">

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="shortcut icon" sizes="192x192" href="icon-192x192.png">

    <link rel="manifest" href="manifest.json">

  </head>

  <body>
    <h2>SongSeeker</h2>

    <!-- compact toolbar with icons for common actions -->
    <div id="toolbar" class="toolbar">
      <button id="settingsIcon" class="icon-button" title="Settings"><i class="fa fa-cog"></i></button>
      <button id="autoplayIcon" class="icon-button" title="Autoplay"><i class="fa fa-play"></i></button>
      <button id="reportsIcon" class="icon-button" title="Reported Songs"><i class="fa fa-list"></i></button>
    </div>

    <!-- autoplay checkbox kept hidden for logic/cookies; toggled via icon -->
    <input type="checkbox" id="autoplay" name="autoplay" style="display:none;" />

    <div class="settings_div hidden" id="settings_div">

      <div class="text-block">
        <div class="heading">Random Playback</div>
        <div>
          <input type="checkbox" id="randomplayback" name="randomplayback" />
          <label for="randomplayback">Random Playback</label>
          <br />
          <label for="playback-duration">Playback Duration (seconds): </label>
                <input type="number" id="playback-duration" value="30">
        </div>      
    </div>
        

      <div class="text-block">
        <div class="heading">Debug</div>
        <div>
          <input type="checkbox" id="songinfo" name="songinfo" />
          <label for="songinfo">Show song info</label>
                <br/>
          <input type="checkbox" id="cookies" name="cookies" />
          <label for="cookies">Show cookies</label>
          <span id="cookielist"></span>
                <br/>
          <button id="debugButton" class="button">Debug Scan</button>
        </div>
      </div>
    </div>

    <div id="qr-reader" style="display:none;">
      <video id="qr-video"></video>
    </div>

    <button id="cancelScanButton" class="button" style="display:none; background-color: var(--accent-stop);">Cancel Scan</button>
    <button id="startScanButton" class="button_startscan">Start Scan</button>
    
    <button id="reportButton" class="button_report" style="display:none;">Report</button>

    <br />
    <button id="startstop-video" class="button_startstop" disabled>Play</button>

    <div id="equalizer" class="equalizer-container">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div id="videoid">Video ID: <span id="video-id"></span></div>
    <div id="videotitle">Title: <span id="video-title"></span></div>
    <div id="videoduration">Duration: <span id="video-duration"></span></div>
    <div id="videoyear">Year: <span id="video-year"></span></div>

    <hr />
    <br/>
    <div>
        <a href="https://github.com/andygruber/songseeker/" target="_blank">View the SongSeeker project on GitHub</a>
    </div>
    <br/>
    <!-- <p id="list"></p> -->

    <div id="player"></div> <audio id="local-player" style="display:none;"></audio><!-- Load YouTube Player -->

    <div id="reportModal" class="modal hidden">
      <div class="modal-content text-block">
        <div class="heading">Report a Problem</div>
        <p style="font-size: 14px; color: var(--text-muted);">Song: <span id="reportSongTitle" style="color: var(--text-main); font-weight: bold;"></span></p>
        
        <label for="reportReason" style="font-size: 14px; margin-top: 10px; display: block;">What is wrong?</label>
        <select id="reportReason" class="modern-select">
          <option value="broken_link">Song doesn't play / Broken Link</option>
          <option value="wrong_song">Wrong Song / Video</option>
          <option value="bad_quality">Bad Audio Quality</option>
          <option value="other">Other</option>
        </select>
        
        <div class="modal-actions">
          <button id="submitReport" class="button_startscan">Submit Report</button>
          <button id="cancelReport" class="button">Cancel</button>
        </div>
      </div>
    </div>

    <!-- modal showing list of reported songs -->
    <div id="reportListModal" class="modal hidden">
      <div class="modal-content text-block">
        <div class="heading">Reported Songs</div>
        <div id="reportsList" class="reports-list">Loading...</div>
        <div class="modal-actions">
          <button id="closeReports" class="button">Close</button>
        </div>
      </div>
    </div>

    <script type="module" src="app.js?version=20250830"></script>

  </body>

</html>
